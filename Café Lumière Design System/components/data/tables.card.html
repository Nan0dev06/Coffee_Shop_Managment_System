<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { DataTable, Badge } = window.CafLumiReDesignSystem_77c5a3;
function Demo() {
  return <div style={{fontFamily:'var(--font-family)',padding:20,background:'var(--surface-page)'}}>
    <DataTable
      columns={[
        { key: 'ingredient', label: 'Ingredient' },
        { key: 'stock', label: 'Stock', align: 'right', width: '100px' },
        { key: 'unit', label: 'Unit', width: '80px' },
        { key: 'status', label: 'Status', width: '120px' },
      ]}
      rows={[
        { ingredient: 'Coffee Beans', stock: '2.4 kg', unit: 'kg', status: 'ok' },
        { ingredient: 'Whole Milk', stock: '1.2 L', unit: 'L', status: 'low' },
        { ingredient: 'Oat Milk', stock: '3.0 L', unit: 'L', status: 'ok' },
        { ingredient: 'Sugar', stock: '0.5 kg', unit: 'kg', status: 'low' },
        { ingredient: 'Vanilla Syrup', stock: '0.8 L', unit: 'L', status: 'ok' },
      ]}
      renderCell={(row, col) =>
        col.key === 'status'
          ? React.createElement(Badge, { variant: row.status === 'low' ? 'warning' : 'success' }, row.status === 'low' ? 'Low Stock' : 'In Stock')
          : row[col.key]
      }
    />
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
