<!-- @dsCard group="Brand" viewport="700x160" name="Brand Mark" subtitle="Café Lumière — primary wordmark treatment" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-family); background: var(--surface-page); display: flex; align-items: center; justify-content: center; min-height: 100%; }
  .wrap { display: flex; gap: 40px; align-items: center; }
  .mark { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 24px 36px; border-radius: 12px; }
  .mark h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.01em; }
  .mark p { margin: 0; font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; }
</style>
</head><body>
  <div class="wrap">
    <div class="mark" style="background:var(--brown-800);color:var(--beige-50)">
      <h1>Café Lumière</h1>
      <p>Coffee Management</p>
    </div>
    <div class="mark" style="background:var(--white);color:var(--brown-900);border:1px solid var(--border-light)">
      <h1>Café Lumière</h1>
      <p style="color:var(--text-secondary)">Coffee Management</p>
    </div>
  </div>
</body></html>
