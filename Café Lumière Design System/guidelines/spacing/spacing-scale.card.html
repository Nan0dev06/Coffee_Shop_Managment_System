<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing Scale" subtitle="4 → 64 px consistent spacing tokens" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; font-family: var(--font-family); background: #fff; color: var(--text-primary); display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .row code { font-size: 11px; font-family: monospace; color: var(--text-secondary); min-width: 60px; }
  .bar { height: 18px; border-radius: 3px; background: var(--brown-600); }
  .row span { font-size: 11px; color: var(--text-secondary); }
</style>
</head><body>
  <div class="row"><code>space-4</code><div class="bar" style="width:4px"></div><span>4</span></div>
  <div class="row"><code>space-8</code><div class="bar" style="width:8px"></div><span>8</span></div>
  <div class="row"><code>space-12</code><div class="bar" style="width:12px"></div><span>12</span></div>
  <div class="row"><code>space-16</code><div class="bar" style="width:16px"></div><span>16</span></div>
  <div class="row"><code>space-24</code><div class="bar" style="width:24px"></div><span>24</span></div>
  <div class="row"><code>space-32</code><div class="bar" style="width:32px"></div><span>32</span></div>
  <div class="row"><code>space-48</code><div class="bar" style="width:48px"></div><span>48</span></div>
  <div class="row"><code>space-64</code><div class="bar" style="width:64px"></div><span>64</span></div>
</body></html>
