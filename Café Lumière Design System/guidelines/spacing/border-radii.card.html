<!-- @dsCard group="Spacing" viewport="700x130" name="Border Radii" subtitle="sm → round corner radius tokens" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; font-family: var(--font-family); background: #fff; display: flex; gap: 20px; align-items: center; }
  .box { width: 72px; height: 72px; background: var(--brown-600); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .box span { font-size: 10px; font-weight: 600; color: #fff; text-align: center; line-height: 1.3; }
  .label { font-size: 11px; font-family: monospace; color: var(--text-secondary); text-align: center; margin-top: 4px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head><body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"><span>4px<br>sm</span></div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"><span>8px<br>md</span></div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"><span>12px<br>lg</span></div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"><span>16px<br>xl</span></div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-round)"><span>round</span></div></div>
</body></html>
