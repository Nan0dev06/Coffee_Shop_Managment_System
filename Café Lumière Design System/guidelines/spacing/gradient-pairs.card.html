<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-family); background: #fff; display: flex; gap: 12px; }
  .grad { flex: 1; border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 80px; }
  .grad b { font-size: 12px; font-weight: 700; }
  .grad code { font-size: 10px; opacity: .8; font-family: monospace; margin-top: 2px; }
</style>
</head><body>
  <div class="grad" style="background:linear-gradient(to bottom,#4E2E1E,#5C3A27);color:#fff"><b>Sidebar</b><code>#4E2E1E → #5C3A27 ↓</code></div>
  <div class="grad" style="background:linear-gradient(to right,#5C3A27,#6F4E37);color:#fff"><b>Primary Button</b><code>#5C3A27 → #6F4E37 →</code></div>
  <div class="grad" style="background:linear-gradient(to bottom,#6F4E37,#8B6B53);color:#fff"><b>Accent Strip</b><code>#6F4E37 → #8B6B53 ↓</code></div>
</body></html>
