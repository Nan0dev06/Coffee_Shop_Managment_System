<!-- @dsCard group="Colors" viewport="700x200" name="Semantic Colors" subtitle="Surfaces, text pairings, feedback states" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-family); background: #fff; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }
  .chip { flex: 1; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; min-height: 32px; }
  .chip span { font-size: 12px; font-weight: 600; }
  .chip code { font-size: 10px; font-family: monospace; opacity: .8; }
</style>
</head><body>
  <div class="row">
    <div class="chip" style="background:var(--surface-page);border:1px solid var(--border-light);color:var(--text-primary)"><span>Page bg</span><code>#FFF8F0</code></div>
    <div class="chip" style="background:var(--surface-card);border:1px solid var(--border-light);color:var(--text-primary)"><span>Card</span><code>#FFFFFF</code></div>
    <div class="chip" style="background:var(--surface-sidebar);color:var(--text-on-dark)"><span>Sidebar</span><code>#4E2E1E</code></div>
    <div class="chip" style="background:var(--surface-alt-row);border:1px solid var(--border-light);color:var(--text-primary)"><span>Alt Row</span><code>#F5E6D3</code></div>
  </div>
  <div class="row">
    <div class="chip" style="background:var(--brown-900);color:#fff"><span>Text Primary</span><code>#3B2314</code></div>
    <div class="chip" style="background:var(--brown-400);color:#fff"><span>Text Secondary</span><code>#8B6B53</code></div>
    <div class="chip" style="background:var(--beige-50);color:var(--brown-900);border:1px solid var(--border-light)"><span>Text on Light</span><code>#3B2314</code></div>
    <div class="chip" style="background:var(--brown-800);color:var(--beige-50)"><span>Text on Dark</span><code>#FFF8F0</code></div>
  </div>
  <div class="row">
    <div class="chip" style="background:var(--warning-bg);color:var(--warning-text);border:1px solid var(--warning)"><span>Warning</span><code>#B7472A</code></div>
    <div class="chip" style="background:var(--success-bg);color:var(--success);border:1px solid var(--success)"><span>Success</span><code>#5B7A3A</code></div>
    <div class="chip" style="background:var(--border-light);color:var(--text-primary)"><span>Border Light</span><code>#E0CAA8</code></div>
    <div class="chip" style="background:var(--border-medium);color:var(--text-primary)"><span>Border Med</span><code>#D4B896</code></div>
  </div>
</body></html>
