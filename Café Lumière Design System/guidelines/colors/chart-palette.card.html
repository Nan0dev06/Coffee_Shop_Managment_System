<!-- @dsCard group="Colors" viewport="700x130" name="Chart Palette" subtitle="5 bar colors for the popular-drink chart" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-family); display: flex; gap: 12px; align-items: flex-end; background: #fff; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; }
  .bar-group span { font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .bar-group code { font-size: 10px; font-family: monospace; color: var(--text-secondary); }
</style>
</head><body>
  <div class="bar-group"><div class="bar" style="height:80px;background:var(--chart-1)"></div><span>Bar 1</span><code>#6F4E37</code></div>
  <div class="bar-group"><div class="bar" style="height:60px;background:var(--chart-2)"></div><span>Bar 2</span><code>#D4B896</code></div>
  <div class="bar-group"><div class="bar" style="height:70px;background:var(--chart-3)"></div><span>Bar 3</span><code>#8B6B53</code></div>
  <div class="bar-group"><div class="bar" style="height:50px;background:var(--chart-4)"></div><span>Bar 4</span><code>#5C3A27</code></div>
  <div class="bar-group"><div class="bar" style="height:65px;background:var(--chart-5)"></div><span>Bar 5</span><code>#C4A67D</code></div>
</body></html>
