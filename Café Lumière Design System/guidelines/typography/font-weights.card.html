<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; font-family: var(--font-family); background: #fff; color: var(--text-primary); display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .row span { font-family: monospace; font-size: 11px; color: var(--text-secondary); min-width: 90px; }
  .row div { font-size: 22px; }
</style>
</head><body>
  <div class="row"><span>Regular 400</span><div style="font-weight:400">The quick brown fox</div></div>
  <div class="row"><span>Medium 500</span><div style="font-weight:500">The quick brown fox</div></div>
  <div class="row"><span>SemiBold 600</span><div style="font-weight:600">The quick brown fox</div></div>
  <div class="row"><span>Bold 700</span><div style="font-weight:700">The quick brown fox</div></div>
</body></html>
